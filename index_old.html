<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>LSCSO MDT</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

<style>
body {
  background: #0f1a1f;
  color: #e8f1f2;
}

/* HEADER MDT */
.header {
  display: flex;
  justify-content: space-between;
  align-items: center;
  background: #1b2a30;
  padding: 15px;
  border-radius: 10px;
  margin-bottom: 20px;
}

.title {
  color: #d4af37;
  font-weight: bold;
  font-size: 20px;
}

/* TARJETAS */
.card-mdt {
  background: #1b2a30;
  border: 1px solid #d4af37;
  border-radius: 10px;
  padding: 15px;
}

/* TABLA */
.table {
  background: #2c3e44;
}

.table th {
  background: #0f1a1f;
  color: #d4af37;
}

/* ESTADOS */
.disponible {
  background-color: #b8f2e6 !important;
}

.no-disponible {
  background-color: #ffb5b5 !important;
}

/* BOTONES */
.btn-sheriff {
  background: #d4af37;
  border: none;
}

.btn-sheriff:hover {
  background: #c19b2e;
}

/* TEXTAREA */
textarea {
  min-height: 70px;
}
</style>
</head>

<body class="container py-3">

<div class="header">
  <div class="title">⭐ LSCSO MDT - Control de Malla</div>
  <button class="btn btn-sheriff" onclick="añadirFila()">➕ Unidad</button>
</div>

<div class="card-mdt mb-3">
  <label>Filtrar por situación:</label>
  <select class="form-select" onchange="filtrar(this.value)">
    <option value="ALL">Todas</option>
    <option value="ST">ST</option>
    <option value="MT">MT</option>
    <option value="GT">GT</option>
    <option value="TAC">TAC</option>
  </select>
</div>

<div class="card-mdt">
  <div class="table-responsive">
    <table class="table table-bordered text-center align-middle">
      <thead>
        <tr>
          <th>Malla</th>
          <th>Unidad</th>
          <th>Estado</th>
          <th>Situación</th>
          <th>Avisos</th>
          <th>Notas</th>
        </tr>
      </thead>
      <tbody id="tabla"></tbody>
    </table>
  </div>
</div>

<script>
const mallas = [
  ...Array.from({length:10}, (_,i)=>`Alpha ${(i+1)*10}`),
  ...Array.from({length:10}, (_,i)=>`Bravo ${(i+1)*10}`),
  "Charlie 1","Charlie 2","Charlie 3",
  "Ocelot 10","Ocelot 20",
  "Bike 10","Bike 20",
  "Yankee","Roger",
  "Foxtrot 10","Foxtrot 20",
  "Mike 10","Mike 20",
  "Dogma 10","Dogma 20",
  "Victor 10","Victor 20",
  "Tiger 10","Tiger 20",
  "Ranger","Shell","Pia"
];

const situaciones = ["-","ST","MT","GT","TAC"];
const estados = ["Disponible","No Disponible"];

let datos = JSON.parse(localStorage.getItem("malla")) || [];

function guardar() {
  localStorage.setItem("malla", JSON.stringify(datos));
}

function crearSelect(opciones, valor, callback) {
  let select = document.createElement("select");
  select.className = "form-select";

  opciones.forEach(op => {
    let option = document.createElement("option");
    option.value = op;
    option.textContent = op;
    if (op === valor) option.selected = true;
    select.appendChild(option);
  });

  select.onchange = e => callback(e.target.value);
  return select;
}

function render() {
  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  datos.forEach((fila, i) => {
    const tr = document.createElement("tr");

    let tdMalla = document.createElement("td");
    tdMalla.appendChild(crearSelect(mallas, fila.malla, val => {
      datos[i].malla = val; guardar();
    }));

    let tdUnidad = document.createElement("td");
    tdUnidad.innerHTML = `<input class="form-control" value="${fila.unidad}" oninput="datos[${i}].unidad=this.value;guardar()">`;

    let tdEstado = document.createElement("td");
    let selEstado = crearSelect(estados, fila.estado, val => {
      datos[i].estado = val;
    
      // 🔥 actualizar color en tiempo real
      selEstado.classList.remove("disponible", "no-disponible");
    
      if (val === "Disponible") {
        selEstado.classList.add("disponible");
      } else {
        selEstado.classList.add("no-disponible");
      }
    
      guardar();
    });

    selEstado.classList.remove("disponible", "no-disponible");

    if (fila.estado === "Disponible") {
      selEstado.classList.add("disponible");
    } else {
      selEstado.classList.add("no-disponible");
    }

    if (fila.estado === "Disponible") selEstado.classList.add("disponible");
    else selEstado.classList.add("no-disponible");

    tdEstado.appendChild(selEstado);

    let tdSit = document.createElement("td");
    tdSit.appendChild(crearSelect(situaciones, fila.situacion, val => {
      datos[i].situacion = val; guardar();
    }));

    let tdAvisos = document.createElement("td");
    tdAvisos.innerHTML = `<textarea class="form-control" oninput="datos[${i}].avisos=this.value;guardar()">${fila.avisos}</textarea>`;

    let tdNotas = document.createElement("td");
    tdNotas.innerHTML = `<textarea class="form-control" oninput="datos[${i}].notas=this.value;guardar()">${fila.notas}</textarea>`;

    tr.append(tdMalla, tdUnidad, tdEstado, tdSit, tdAvisos, tdNotas);
    tabla.appendChild(tr);
  });
}

function añadirFila() {
  datos.push({
    malla: "Alpha 10",
    unidad: "",
    estado: "Disponible",
    situacion: "ST",
    avisos: "",
    notas: ""
  });
  guardar();
  render();
}

function filtrar(tipo) {
  if (tipo === "ALL") return render();

  const tabla = document.getElementById("tabla");
  tabla.innerHTML = "";

  datos.forEach((fila, i) => {
    if (fila.situacion === tipo) {
      const tr = document.createElement("tr");
      tr.innerHTML = `<td>${fila.malla}</td><td>${fila.unidad}</td><td>${fila.estado}</td><td>${fila.situacion}</td><td>${fila.avisos}</td><td>${fila.notas}</td>`;
      tabla.appendChild(tr);
    }
  });
}

render();
</script>

</body>
</html>
