<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>🚓 Sheriff Central</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<div class="container">

  <h1>🚓 SHERIFF CENTRAL</h1>

  <div class="top-bar">
    <input type="text" id="search" placeholder="Buscar unidad..." onkeyup="filtrar()">
  </div>

  <div class="grid">

    <!-- UNIDADES -->
    <div class="panel">
      <h2>Unidades</h2>
      <table id="tabla">
        <tr>
          <th>Malla</th>
          <th>Unidad</th>
          <th>Tipo</th>
          <th>Estado</th>
          <th>Aviso</th>
        </tr>

        <tr>
          <td>Alpha 10</td>
          <td>A-10</td>
          <td>ST</td>
          <td class="disponible">Disponible</td>
          <td>-</td>
        </tr>

        <tr>
          <td>Bravo 20</td>
          <td>B-20</td>
          <td>MT</td>
          <td class="servicio">En servicio</td>
          <td>Ammu</td>
        </tr>

      </table>
    </div>

    <!-- TACS -->
    <div class="panel">
      <h2>TACs Activos</h2>
      <ul>
        <li>ST-1 → Robos peque</li>
        <li>MT-2 → Ammu</li>
        <li>GT-3 → Humane</li>
      </ul>
    </div>

    <!-- ESTADÍSTICAS -->
    <div class="panel">
      <h2>Estado General</h2>
      <p>🟢 Disponibles: 5</p>
      <p>🟡 En servicio: 2</p>
      <p>🔴 Indisponibles: 1</p>
    </div>

  </div>

</div>

<script src="script.js"></script>
</body>
</html>
