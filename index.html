<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>LSCSO Control</title>

  <link rel="stylesheet" href="style.css">

  <!-- Firebase -->
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/8.10.0/firebase-firestore.js"></script>
</head>

<body>

<div class="header">
  <div class="badge">⭐</div>
  <h1>LSCSO CONTROL DE MALLA</h1>
  <h2>📊 Panel de Estadísticas</h2>

<div id="stats" class="stats-container">
  <div class="stat-box">Total avisos: <span id="totalAvisos">0</span></div>
  <div class="stat-box">Unidades activas: <span id="totalUnidades">0</span></div>
  <div class="stat-box">Disponibles: <span id="disponibles">0</span></div>
  <div class="stat-box">No disponibles: <span id="noDisponibles">0</span></div>
  <div class="stat-box">ST: <span id="st">0</span></div>
  <div class="stat-box">MT: <span id="mt">0</span></div>
  <div class="stat-box">GT: <span id="gt">0</span></div>
  <div class="stat-box">TAC: <span id="tac">0</span></div>
</div>

<div class="filtros">
  <button onclick="filtrar('ALL')">Todos</button>
  <button onclick="filtrar('ST')">ST</button>
  <button onclick="filtrar('MT')">MT</button>
  <button onclick="filtrar('GT')">GT</button>
  <button onclick="filtrar('TAC')">TAC</button>
</div>

<table>
  <thead>
    <tr>
      <th>Malla</th>
      <th>Unidad</th>
      <th>Estado</th>
      <th>Situación</th>
      <th>Avisos</th>
      <th>Total</th>
      <th>Notas</th>
    </tr>
  </thead>
  <tbody id="tabla"></tbody>
</table>

<button onclick="crearUnidad()">➕ Nueva Unidad</button>

<script src="firebase.js"></script>
<script src="app.js"></script>

</body>
</html>
